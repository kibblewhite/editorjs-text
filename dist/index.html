<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>editorjs-text</title>
    <link rel="stylesheet" href="https://unpkg.com/turretcss/dist/turretcss.min.css" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    <style>
      .editor-container {
        border: thin dashed grey;
        padding: 20px;
      }
      main > .container {
        margin-top: 2rem;
      }
      nav, section > button {
        margin-top: 0.75rem;
      }
      nav {
        display: flex;
        gap: 0.5rem;
      }
    </style>
  </head>
  <body>

    <main>

      <div class="container">
        <section>
          <h2>Editor 1 — Title (LTR)</h2>
          <div id="editorjs" class="editor-container"></div>
          <nav>
            <button id="load-data-button">Load Data</button>
          </nav>
        </section>
      </div>

      <div class="container">
        <section>
          <h2>Editor 2 — Text (LTR)</h2>
          <div id="editorjs2" class="editor-container"></div>
          <nav>
            <button id="invoke-insert-button">Invoke Insert</button>
            <button id="invoke-insert-paragraph-button">Invoke Insert Paragraph</button>
          </nav>
        </section>
      </div>

      <div class="container">
        <section>
          <h2>Editor 3 — Text (RTL)</h2>
          <div id="editorjs3" class="editor-container" dir="rtl"></div>
        </section>
      </div>

      <div class="container">
        <section>
          <button id="save-button">Save</button>
          <pre id="output"></pre>
        </section>
      </div>

    </main>

    <script type="text/javascript" src="bundle.js"></script>
    <script>

      /**
       * Initialize Editor 1 — Title (LTR)
       */
      const editor = new EditorJS({
        holder: 'editorjs',
        autofocus: true,
        defaultBlock: 'text',
        tools: {
          paragraph: { class: TextElement.DisabledParagraph },
          text: {
            class: TextElement,
            inlineToolbar: true,
            config: {
              placeholder: '...',
              preserveBlank: false,
              allowEnterKeyDown: false,
              hidePopoverItem: true,
              hideToolbar: true,
              wrapElement: 'title',
              startMarginZero: true
            }
          }
        },
        data: {
          blocks: []
        },
        onReady: () => {
          editor.events.on('block:enter', (eventData) => {
            console.log('Event captured:', eventData);
          });
        }
      });

      /**
       * Initialize Editor 2 — Text (LTR)
       */
       const editor2 = new EditorJS({
        holder: 'editorjs2',
        autofocus: false,
        defaultBlock: 'text',
        tools: {
          paragraph: { class: TextElement.DisabledParagraph },
          text: {
            class: TextElement,
            inlineToolbar: true,
            config: {
              placeholder: '...',
              preserveBlank: false,
              allowEnterKeyDown: false,
              hidePopoverItem: false,
              wrapElement: 'text',
              startMarginZero: false
            }
          }
        },
        data: {
          blocks: []
        }
      });

      /**
       * Initialize Editor 3 — Text (RTL)
       */
      const editor3 = new EditorJS({
        holder: 'editorjs3',
        defaultBlock: 'text',
        i18n: {
          direction: 'rtl'
        },
        tools: {
          paragraph: { class: TextElement.DisabledParagraph },
          text: {
            class: TextElement,
            inlineToolbar: true,
            config: {
              placeholder: '...',
              preserveBlank: false,
              allowEnterKeyDown: false,
              hidePopoverItem: false,
              wrapElement: 'text',
              startMarginZero: false,
              direction: 'rtl'
            }
          }
        },
        data: {
          blocks: []
        }
      });

      /**
       * Sample data simulating a database/API response.
       * Includes: valid text blocks, an unsupported block type,
       * a block with missing data, and a malformed block.
       */
      const sampleData = {
        time: 1717207275445,
        blocks: [
          {
            id: 'validText1',
            type: 'text',
            data: {
              text: 'This is a valid text block loaded from a data source'
            }
          },
          {
            id: 'unsupportedBlock',
            type: 'header',
            data: {
              text: 'This is an unsupported header block',
              level: 2
            }
          },
          {
            id: 'validText2',
            type: 'text',
            data: {
              text: 'Another valid text block after the unsupported one'
            }
          },
          {
            id: 'emptyDataBlock',
            type: 'text',
            data: {}
          },
          {
            id: 'unknownType',
            type: 'checklist',
            data: {
              items: [{ text: 'Item 1', checked: true }]
            }
          }
        ],
        version: '2.29.1'
      };

      /**
       * Add handler for the Load Data button
       */
      const loadDataButton = document.getElementById('load-data-button');
      loadDataButton.addEventListener('click', () => {
        editor.render(sampleData);
      });

      /**
       * Add handler for the Invoke Insert button
       */
      const invokeInsertButton = document.getElementById('invoke-insert-button');
      invokeInsertButton.addEventListener('click', () => {
        editor2.blocks.insert('text', { text: 'Injected content via Invoke Insert' });
      });

      /**
       * Add handler for the Invoke Insert Paragraph button
       */
      const invokeInsertParagraphButton = document.getElementById('invoke-insert-paragraph-button');
      invokeInsertParagraphButton.addEventListener('click', () => {
        editor2.blocks.insert('paragraph', { text: 'Hey. Meet the new Editor. On this picture you can see it in action. Then, try a demo' });
      });

      /**
       * Add handler for the Save button
       */
      const saveButton = document.getElementById('save-button');
      const output = document.getElementById('output');

      saveButton.addEventListener('click', () => {
        editor.save().then(data => {

          data.blocks.forEach(function (item, index, array) {
            switch(item.type)
            {
              case "text":
              {
                array[index].data.text = encodeHTML(item.data.text);
                break;
              }
            }
          });

          const json_string = JSON.stringify(data, null, 6);
          output.innerHTML = json_string;
        });
      });


      function encodeHTML(html) {
        let div_element = document.createElement('div');
        let text_node = document.createTextNode(html);
        div_element.appendChild(text_node);
        return div_element.innerHTML;
      }
    </script>

  </body>
</html>
